services:
  hmpps-money-to-prisoners-api:
    build:
      context: .
    networks:
      - hmpps
    container_name: hmpps-money-to-prisoners-api
    depends_on:
      hmpps-money-to-prisoners-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      - SPRING_PROFILES_ACTIVE=dev
      - DB_SERVER=hmpps-money-to-prisoners-db:5432
      - DB_NAME=money_to_prisoners_api
      - DB_USER=postgres
      - DB_PASS=postgres

  hmpps-money-to-prisoners-db:
    image: postgres:16
    networks:
      - hmpps
    container_name: hmpps-money-to-prisoners-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money_to_prisoners -d money_to_prisoners"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_DB=money_to_prisoners_api
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0

networks:
  hmpps:
